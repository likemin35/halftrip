name: travel_support_mvp
description: Flutter MVP for travel application, management, evidence upload, and settlement preparation.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.5
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/logo/
    - assets/card/
    - assets/localmoney/
    - assets/spot/
    - assets/region_hero/
